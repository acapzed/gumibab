<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>구미 2C 3식당 메뉴</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>구미 2C 3식당</h1>
      <div class="controls">
        <button id="btn-prev-day" class="nav-btn">&lt;</button>
        <div id="date-display" class="date-text"></div>
        <button id="btn-next-day" class="nav-btn">&gt;</button>
      </div>
      <div class="meal-tabs">
        <button class="tab-btn active" data-meal="2">중식</button>
        <button class="tab-btn" data-meal="3">석식</button>
      </div>
    </header>
    
    <div id="content-area">
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
      </div>
      <div id="error" class="error hidden"></div>
      
      <div id="menu-container" class="menu-container">
        <!-- 메뉴 아이템이 여기에 동적으로 추가됩니다 -->
      </div>
      
      <footer>
        <a href="https://github.com/acapzed/gumibab" target="_blank" id="github-link">
          <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
          </svg>
          GitHub Docs
        </a>
      </footer>
    </div>
  </div>

  <!-- 이미지 확대 모달 -->
  <div id="image-modal" class="modal hidden">
    <span class="modal-close">&times;</span>
    <img id="modal-image" class="modal-content">
  </div>

  <script src="popup.js"></script>
</body>
</html>
